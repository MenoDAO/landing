<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100">
  <defs>
    <style>
      .mpesa-text { fill: #00A651; font-family: Arial, sans-serif; font-weight: bold; }
      .lipa-text { fill: #00A651; font-family: Arial, sans-serif; font-weight: normal; }
      .phone-icon { fill: #00A651; }
      .arrow { fill: #E31E24; }
    </style>
  </defs>
  
  <!-- LIPA NA text -->
  <text x="10" y="50" class="lipa-text" font-size="32">LIPA NA</text>
  
  <!-- Phone icon background -->
  <rect x="200" y="10" width="60" height="80" rx="8" fill="#E8F5E9" stroke="#00A651" stroke-width="2"/>
  
  <!-- Phone screen -->
  <rect x="210" y="20" width="40" height="50" rx="2" fill="white"/>
  
  <!-- Arrow -->
  <path d="M 240 45 L 260 35 L 260 40 L 280 40 L 280 50 L 260 50 L 260 55 Z" class="arrow"/>
  
  <!-- m-pesa text -->
  <text x="290" y="55" class="mpesa-text" font-size="48">m</text>
  <text x="330" y="55" class="mpesa-text" font-size="48">pesa</text>
  
  <!-- Underline for pesa -->
  <line x1="330" y1="60" x2="480" y2="60" stroke="#00A651" stroke-width="3"/>
</svg>
