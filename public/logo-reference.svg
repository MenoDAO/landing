<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circuit board lines extending from hexagon vertices -->
  <!-- Top vertex -->
  <line x1="60" y1="10" x2="60" y2="5" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y2="5" x2="55" y2="2" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y2="5" x2="65" y2="2" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="53" cy="0" r="2" fill="#1e3a8a"/>
  <circle cx="67" cy="0" r="2" fill="#1e3a8a"/>
  
  <!-- Top-right vertex -->
  <line x1="95" y1="25" x2="105" y2="30" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="30" x2="108" y2="25" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="105" y1="30" x2="108" y2="35" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="112" cy="22" r="2" fill="#1e3a8a"/>
  <circle cx="112" cy="38" r="2" fill="#1e3a8a"/>
  
  <!-- Bottom-right vertex -->
  <line x1="95" y1="75" x2="105" y2="80" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="80" x2="108" y2="75" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="105" y1="80" x2="108" y2="85" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="112" cy="72" r="2" fill="#1e3a8a"/>
  <circle cx="112" cy="88" r="2" fill="#1e3a8a"/>
  
  <!-- Bottom vertex -->
  <line x1="60" y1="90" x2="60" y2="100" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y2="100" x2="55" y2="103" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y2="100" x2="65" y2="103" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="53" cy="105" r="2" fill="#1e3a8a"/>
  <circle cx="67" cy="105" r="2" fill="#1e3a8a"/>
  
  <!-- Bottom-left vertex -->
  <line x1="25" y1="75" x2="15" y2="80" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="80" x2="12" y2="75" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="80" x2="12" y2="85" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="8" cy="72" r="2" fill="#1e3a8a"/>
  <circle cx="8" cy="88" r="2" fill="#1e3a8a"/>
  
  <!-- Top-left vertex -->
  <line x1="25" y1="25" x2="15" y2="30" stroke="#1e3a8a" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="30" x2="12" y2="25" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="30" x2="12" y2="35" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="8" cy="22" r="2" fill="#1e3a8a"/>
  <circle cx="8" cy="38" r="2" fill="#1e3a8a"/>
  
  <!-- Hexagon -->
  <polygon points="60,10 95,25 95,75 60,90 25,75 25,25" stroke="#1e3a8a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Plus sign (above and slightly to the left of tooth) -->
  <line x1="48" y1="38" x2="48" y2="42" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="40" x2="50" y2="40" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Tooth shape with smiling mouth -->
  <path d="M 50 48 
           C 48 45, 52 45, 55 45 
           C 58 45, 60 45, 60 48 
           C 60 50, 62 52, 65 52 
           C 65 54, 65 58, 60 60 
           C 55 60, 50 60, 45 58 
           C 45 54, 45 52, 47 52 
           C 48 50, 50 48, 50 48 Z" 
        stroke="#1e3a8a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Smiling mouth curve -->
  <path d="M 52 58 Q 56 60 60 58" stroke="#1e3a8a" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>

